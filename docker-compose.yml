services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse_pg
    restart: always
    environment:
      POSTGRES_USER: capellax
      POSTGRES_PASSWORD: capellax
      POSTGRES_DB: capellax_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pulse_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: